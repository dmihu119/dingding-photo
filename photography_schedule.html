<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>丁叮摄影｜预约档期查询</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#e9e1d6;color:#2b211b} a{text-decoration:none;color:inherit}
    .top{position:sticky;top:0;z-index:20;background:#2b211b;color:#fff;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 6px 18px rgba(0,0,0,.18)}
    .top b{font-size:22px;letter-spacing:.04em}.top a{font-size:16px;opacity:.92}
    .wrap{max-width:980px;margin:0 auto;padding:14px 10px 44px}.panel{background:#fff;border-radius:22px;padding:14px;margin:12px 0;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    .weekbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{border:0;border-radius:999px;padding:14px 12px;font-size:16px;background:#2b211b;color:#fff;cursor:pointer}.btn.gold{background:#d9a64f;color:#2b211b;font-weight:700}.btn.light{background:#fff;color:#2b211b;border:1px solid #eadfce}.btn.green{background:#1f7a3f;color:white}.btn.red{background:#a33b30;color:white}.btn.gray{background:#777;color:white}.btn.yellow{background:#d9a64f;color:#2b211b}
    .hint{font-size:15px;color:#6d5a4d;line-height:1.8;margin:12px 8px 2px}.adminbar{display:none;gap:8px;flex-wrap:wrap}.adminbar.show{display:flex}.adminbar select,.adminbar input{border:1px solid #eadfce;border-radius:999px;padding:12px;background:#fff;font-size:15px;min-width:160px}
    .days{display:grid;gap:12px}.day-card{background:#fff;border-radius:24px;padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.07)}.day-head{position:sticky;top:64px;z-index:10;background:#fff;border-bottom:1px solid #f0e9df;margin:-14px -14px 12px;padding:14px;border-radius:24px 24px 0 0;display:flex;align-items:center;justify-content:space-between}.day-head h2{margin:0;font-size:22px;color:#57483d}.day-head span{font-size:15px;color:#8a7564}
    .slots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.slot{border:2px solid transparent;border-radius:18px;padding:14px 10px;min-height:92px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer}.slot strong{font-size:20px}.slot small{font-size:13px;opacity:.78}.slot .guest{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.available{background:#edf8ef;color:#1f7a3f;border-color:#ccebd4}.pending{background:#fff8dc;color:#9a6b00;border-color:#f0d47b}.booked{background:#fff0ee;color:#a33b30;border-color:#ffd1cb}.rest{background:#f0f0f0;color:#777;border-color:#ddd}.legend{display:flex;gap:10px;flex-wrap:wrap;margin:12px 4px 0;color:#6d5a4d}.dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:5px}.dot.a{background:#68c27c}.dot.p{background:#d9a64f}.dot.b{background:#dc675c}.dot.r{background:#999}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;align-items:center;justify-content:center;padding:14px}.modal.show{display:flex}.box{width:min(520px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;padding:20px;box-shadow:0 18px 50px rgba(0,0,0,.25)}.box h2{margin:0 0 8px;color:#2b211b}.box p{color:#6d5a4d;line-height:1.7}.form{display:grid;gap:10px}.form input,.form select,.form textarea{width:100%;border:1px solid #eadfce;border-radius:16px;padding:13px;font-size:16px}.form textarea{min-height:80px;resize:vertical}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.payqr{width:100%;max-width:340px;display:block;margin:12px auto;border-radius:18px}.pay-note{background:#fffaf3;border:1px solid #f1dfc5;border-radius:16px;padding:12px;font-size:15px;color:#715f4d}.desktop-table{display:none}
    @media (min-width:820px){.slots{grid-template-columns:repeat(5,minmax(0,1fr))}.days{grid-template-columns:1fr}.desktop-table{display:none}}
    @media (max-width:480px){.top{height:58px}.top b{font-size:20px}.wrap{padding-left:7px;padding-right:7px}.weekbar{gap:7px}.btn{font-size:15px;padding:13px 8px}.panel{border-radius:20px}.day-head{top:58px}.slots{grid-template-columns:1fr}.slot{min-height:84px}.actions{grid-template-columns:1fr}.box{border-radius:20px;padding:16px}}
  </style>
</head>
<body>
  <header class="top"><b>丁叮摄影</b><a href="index.html">返回首页</a></header>
  <main class="wrap">
    <section class="panel">
      <div class="weekbar"><button class="btn" onclick="changeWeek(-7)">上一周</button><button class="btn" onclick="goToday()">本周/今天</button><button class="btn" onclick="changeWeek(7)">下一周</button></div>
      <div class="hint">客人模式：点击绿色档期提交预约，填写资料后进入定金支付页。</div>
      <div class="legend"><span><i class="dot a"></i>可预约</span><span><i class="dot p"></i>待确认</span><span><i class="dot b"></i>已预约</span><span><i class="dot r"></i>休息</span></div>
    </section>
    <section class="panel"><button class="btn gold" style="width:100%" onclick="openAdmin()">摄影师管理</button><div id="adminbar" class="adminbar" style="margin-top:10px"><select id="editMode"><option value="available">点击设为：可预约</option><option value="pending">点击设为：待确认</option><option value="booked">点击设为：已预约</option><option value="rest">点击设为：休息</option></select><button class="btn light" onclick="copySchedule()">复制本周档期</button><button class="btn red" onclick="resetSchedule()">清空本机档期</button></div></section>
    <section id="days" class="days"></section>
  </main>

  <div id="bookingModal" class="modal"><div class="box"><h2>提交预约</h2><p id="bookingInfo"></p><div class="form"><input id="name" placeholder="姓名，例如：张小姐"><input id="wechat" placeholder="微信号"><input id="phone" placeholder="电话"><select id="package"><option value="单人套餐 299">单人套餐 299</option><option value="情侣套餐 399">情侣套餐 399</option><option value="亲子套餐 428">亲子套餐 428</option><option value="一小时套餐 499">一小时套餐 499</option><option value="二小时套餐 999">二小时套餐 999</option><option value="无人机视频 499">无人机视频 499</option><option value="旱地拔葱视频 299">旱地拔葱视频 299</option></select><textarea id="note" placeholder="备注：拍摄地点、人数、风格等"></textarea></div><div class="actions"><button class="btn light" onclick="closeModal('bookingModal')">取消</button><button class="btn green" onclick="submitBooking()">提交预约并支付定金</button></div></div></div>
  <div id="payModal" class="modal"><div class="box"><h2>支付定金</h2><div class="pay-note" id="payInfo">请长按保存或截图微信收款码，完成定金支付后加微信确认。</div><img class="payqr" src="images/payment-qr.jpg" alt="微信支付收款码"><div class="actions"><button class="btn light" onclick="closeModal('payModal')">稍后支付</button><a class="btn green" style="text-align:center" href="weixin://">打开微信</a></div><p>微信：dmihu119　电话：13816677703</p></div></div>
  <script>
    const startHour=10,endHour=20,adminPassword='119';let weekOffset=0,admin=false,currentSlot=null;const statusText={available:'可预约',pending:'待确认',booked:'已预约',rest:'休息'};
    function pad(n){return String(n).padStart(2,'0')} function fdate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`} function md(d){return `${pad(d.getMonth()+1)}/${pad(d.getDate())}`} function wk(d){return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}
    function getWeekDates(){const t=new Date();t.setHours(0,0,0,0);t.setDate(t.getDate()+weekOffset);const day=t.getDay()||7;const m=new Date(t);m.setDate(t.getDate()-day+1);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d})}
    function load(){return JSON.parse(localStorage.getItem('photoScheduleV2')||'{}')} function save(data){localStorage.setItem('photoScheduleV2',JSON.stringify(data))}
    function key(date,h){return `${date}_${h}`} function getSlot(date,h){const data=load();return data[key(date,h)]||{status:'available'}} function setSlot(date,h,obj){const data=load();data[key(date,h)]={...getSlot(date,h),...obj};save(data);render()}
    function render(){const box=document.getElementById('days');let html='';getWeekDates().forEach(d=>{const date=fdate(d);html+=`<div class="day-card"><div class="day-head"><h2>${md(d)} ${wk(d)}</h2><span>${date}</span></div><div class="slots">`;for(let h=startHour;h<endHour;h++){const s=getSlot(date,h);const guest=s.name?`<div class="guest">${s.name}｜${s.package||''}</div>`:'';html+=`<div class="slot ${s.status||'available'}" onclick="clickSlot('${date}',${h})"><strong>${statusText[s.status||'available']}</strong><small>${pad(h)}:00-${pad(h+1)}:00</small>${guest}</div>`}html+='</div></div>'});box.innerHTML=html}
    function changeWeek(n){weekOffset+=n;render();scrollTo({top:0,behavior:'smooth'})} function goToday(){weekOffset=0;render();scrollTo({top:0,behavior:'smooth'})}
    function openAdmin(){if(!admin){const p=prompt('请输入摄影师管理密码');if(p!==adminPassword){alert('密码不正确');return}admin=true;document.getElementById('adminbar').classList.add('show')}else{admin=false;document.getElementById('adminbar').classList.remove('show')}}
    function clickSlot(date,h){const s=getSlot(date,h);if(admin){const status=document.getElementById('editMode').value;setSlot(date,h,{status});return} if((s.status||'available')!=='available'){alert('这个时间暂时不可预约，请选择绿色档期。');return}currentSlot={date,h};document.getElementById('bookingInfo').innerHTML=`预约时间：<b>${date} ${pad(h)}:00-${pad(h+1)}:00</b>`;['name','wechat','phone','note'].forEach(id=>document.getElementById(id).value='');document.getElementById('bookingModal').classList.add('show')}
    function closeModal(id){document.getElementById(id).classList.remove('show')}
    function submitBooking(){const name=document.getElementById('name').value.trim(),wechat=document.getElementById('wechat').value.trim(),phone=document.getElementById('phone').value.trim(),pkg=document.getElementById('package').value,note=document.getElementById('note').value.trim();if(!name||!wechat||!phone){alert('请填写姓名、微信和电话');return}setSlot(currentSlot.date,currentSlot.h,{status:'pending',name,wechat,phone,package:pkg,note});closeModal('bookingModal');document.getElementById('payInfo').innerHTML=`预约已提交：<b>${currentSlot.date} ${pad(currentSlot.h)}:00-${pad(currentSlot.h+1)}:00</b><br>套餐：${pkg}<br>请支付定金后联系微信 dmihu119 确认。`;document.getElementById('payModal').classList.add('show')}
    function copySchedule(){let text='丁叮摄影预约档期\n';getWeekDates().forEach(d=>{const date=fdate(d);text+=`\n${date} ${wk(d)}\n`;for(let h=startHour;h<endHour;h++){const s=getSlot(date,h);text+=`${pad(h)}:00-${pad(h+1)}:00 ${statusText[s.status||'available']}${s.name?'｜'+s.name+'｜'+(s.package||''):''}\n`}});navigator.clipboard.writeText(text).then(()=>alert('已复制本周档期'))}
    function resetSchedule(){if(confirm('确定清空当前手机/电脑浏览器保存的档期吗？')){localStorage.removeItem('photoScheduleV2');render()}}
    render();
  </script>
</body>
</html>
