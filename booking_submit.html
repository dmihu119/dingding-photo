<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提交预约与支付定金 - 丁叮摄影</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#eee6dc;color:#2d2926}.top{background:#2b211b;color:#fff;padding:18px 5vw;display:flex;justify-content:space-between;align-items:center}.top a{color:#fff;text-decoration:none}.brand{font-size:22px;font-weight:800;letter-spacing:.08em}.wrap{max-width:920px;margin:auto;padding:24px 14px 56px}.card{background:#fff;border-radius:24px;padding:22px;margin:16px 0;box-shadow:0 14px 38px rgba(0,0,0,.08)}h1{font-size:clamp(28px,6vw,46px);margin:0 0 8px}.step{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:#2b211b;color:#fff;font-weight:800;margin-right:8px}.info{background:#fffaf3;border:1px solid #ead6be;border-radius:18px;padding:14px;line-height:1.9;color:#5c4d42}.btn{display:flex;align-items:center;justify-content:center;text-align:center;width:100%;border:0;border-radius:999px;padding:16px 20px;margin:12px 0;background:#2b211b;color:#fff;text-decoration:none;font-size:18px;font-weight:800}.btn.green{background:#12b65a}.btn.gold{background:#d99d45;color:#24160d}.qr{max-width:420px;width:100%;display:block;margin:14px auto;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.12)}.muted{color:#76695f;line-height:1.8}.copy{white-space:pre-wrap;background:#f7f2ec;border-radius:16px;padding:14px;line-height:1.8;font-size:15px}.small{font-size:14px;color:#7b6d63} @media(max-width:640px){.top{padding:14px 16px}.wrap{padding:16px 10px 42px}.card{padding:18px 14px;border-radius:20px}.btn{font-size:16px}}
  </style>
</head>
<body>
  <header class="top"><div class="brand">丁叮摄影</div><a href="photography_schedule.html">返回档期表</a></header>
  <main class="wrap">
    <section class="card">
      <h1>预约登记</h1>
      <p class="muted">请按下面两步完成：先填写腾讯文档预约表，再支付定金。</p>
      <div class="info" id="summary"></div>
    </section>
    <section class="card">
      <h2><span class="step">1</span>填写在线预约表</h2>
      <p class="muted">点击下面按钮填写腾讯文档收集表。提交后，你的预约信息会同步到摄影师后台。</p>
      <div class="copy" id="copyText"></div>
      <button class="btn gold" onclick="copyInfo()">复制预约信息</button>
      <a class="btn green" id="formLink" target="_blank" rel="noopener">打开腾讯预约表</a>
      <p class="small">打开表单后，可以把上面的日期、时间、套餐复制进去。</p>
    </section>
    <section class="card">
      <h2><span class="step">2</span>支付定金</h2>
      <p class="muted">提交预约登记后，请支付定金并添加微信 <b>dmihu119</b> 发送付款截图。摄影师确认后锁定档期。</p>
      <img class="qr" src="images/wechat-pay-deposit.jpg" alt="微信支付定金二维码">
      <a class="btn" href="deposit_payment.html">打开支付页面</a>
    </section>
  </main>
<script>
  const FORM='https://docs.qq.com/form/page/DSHhLT3RVbmNIRFNm';
  const p=new URLSearchParams(location.search);
  const date=p.get('date')||'';
  const time=p.get('time')||'';
  const pkg=p.get('package')||'其他/待沟通';
  const text=`预约日期：${date}\n预约时间：${time}\n预约套餐：${pkg}`;
  document.getElementById('summary').innerHTML=`<b>预约日期：</b>${date||'待填写'}<br><b>预约时间：</b>${time||'待填写'}<br><b>预约套餐：</b>${pkg}`;
  document.getElementById('copyText').textContent=text;
  document.getElementById('formLink').href=FORM;
  function copyInfo(){navigator.clipboard&&navigator.clipboard.writeText(text).then(()=>alert('已复制预约信息，请粘贴到腾讯预约表里。')).catch(()=>alert(text));}
</script>
</body>
</html>
